    function mcFacePixels(u, v, w, h, d) {
      return {
        top:    { x: u + d,     y: v,       pw: w, ph: d },
        bottom: { x: u + d + w, y: v,       pw: w, ph: d },
        west:   { x: u,         y: v + d,   pw: d, ph: h },
        south:  { x: u + d,     y: v + d,   pw: w, ph: h },
        east:   { x: u + d + w + d, y: v + d, pw: d, ph: h },
        north:  { x: u + d + w, y: v + d,   pw: w, ph: h },
      };
    }

    function quadUVs(px, py, pw, ph, texW, texH, mirrorU) {
      const u0 = px / texW;
      const u1 = (px + pw) / texW;
      const vTop = 1 - py / texH;
      const vBot = 1 - (py + ph) / texH;
      const a = [u0, vBot, u1, vBot, u1, vTop, u0, vTop];
      if (mirrorU) return [u1, vBot, u0, vBot, u0, vTop, u1, vTop];
      return a;
    }

    function buildGeometry(cubes, texW, texH) {
      const vertices = [];
      const uvs = [];
      const indices = [];

      for (const c of cubes) {
        const [ox, oy, oz] = c.origin;
        const [sx, sy, sz] = c.size;
        const [uu, vv] = c.uv;
        const inf = c.inflate || 0;
        const mirrorU = !!c.mirror;
        const w = sx + 2 * inf;
        const h = sy + 2 * inf;
        const d = sz + 2 * inf;
        const faces = mcFacePixels(uu, vv, w, h, d);
        const cx = ox + sx / 2;
        const cy = oy + sy / 2;
        const cz = oz + sz / 2;
        const hx = w / 2;
        const hy = h / 2;
        const hz = d / 2;

        const pushQuad = (p0, p1, p2, p3, faceKey) => {
          const f = faces[faceKey];
          const q = quadUVs(f.x, f.y, f.pw, f.ph, texW, texH, mirrorU);
          const base = vertices.length / 3;
          for (let k = 0; k < 4; k++) {
            const p = [p0, p1, p2, p3][k];
            vertices.push(p[0] * SCALE, p[1] * SCALE, p[2] * SCALE);
            uvs.push(q[k * 2], q[k * 2 + 1]);
          }
          indices.push(base, base + 1, base + 2, base, base + 2, base + 3);
        };

        pushQuad([cx + hx, cy - hy, cz + hz], [cx + hx, cy - hy, cz - hz], [cx + hx, cy + hy, cz - hz], [cx + hx, cy + hy, cz + hz], 'east');
        pushQuad([cx - hx, cy - hy, cz - hz], [cx - hx, cy - hy, cz + hz], [cx - hx, cy + hy, cz + hz], [cx - hx, cy + hy, cz - hz], 'west');
        pushQuad([cx - hx, cy + hy, cz + hz], [cx + hx, cy + hy, cz + hz], [cx + hx, cy + hy, cz - hz], [cx - hx, cy + hy, cz - hz], 'top');
        pushQuad([cx - hx, cy - hy, cz - hz], [cx + hx, cy - hy, cz - hz], [cx + hx, cy - hy, cz + hz], [cx - hx, cy - hy, cz + hz], 'bottom');
        pushQuad([cx - hx, cy - hy, cz + hz], [cx + hx, cy - hy, cz + hz], [cx + hx, cy + hy, cz + hz], [cx - hx, cy + hy, cz + hz], 'south');
        pushQuad([cx + hx, cy - hy, cz - hz], [cx - hx, cy - hy, cz - hz], [cx - hx, cy + hy, cz - hz], [cx + hx, cy + hy, cz - hz], 'north');
      }

      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
      g.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      g.setIndex(indices);
      g.computeVertexNormals();
      return g;
    }

    const CUBES_INVOKER = [
      { origin: [-4, 12, -3], size: [8, 12, 6], uv: [16, 20] },
      { origin: [-4, 6, -3], size: [8, 18, 6], uv: [0, 38], inflate: 0.5 },
      { origin: [-4, 24, -4], size: [8, 10, 8], uv: [0, 0] },
      { origin: [-1, 23, -6], size: [2, 4, 2], uv: [24, 0] },
      { origin: [-8, 12, -2], size: [4, 12, 4], uv: [40, 46] },
      { origin: [4, 12, -2], size: [4, 12, 4], uv: [40, 46] },
      { origin: [-4, 0, -2], size: [4, 12, 4], uv: [0, 22] },
      { origin: [0, 0, -2], size: [4, 12, 4], uv: [0, 22] },
    ];

    const CUBES_ZOMBIE = [
      { origin: [-4, 12, -2], size: [8, 12, 4], uv: [16, 16] },
      { origin: [-4, 24, -4], size: [8, 8, 8], uv: [0, 0] },
      { origin: [-8, 12, -2], size: [4, 12, 4], uv: [40, 16] },
      { origin: [4, 12, -2], size: [4, 12, 4], uv: [40, 16], mirror: true },
      { origin: [-4, 0, -2], size: [4, 12, 4], uv: [0, 16] },
      { origin: [0, 0, -2], size: [4, 12, 4], uv: [0, 16], mirror: true },
    ];

    const CONFIG = {
      invoker: { texW: 64, texH: 64, cubes: CUBES_INVOKER, targetY: 0.9, cam: [1.2, 1.0, 1.8] },
      zombie: { texW: 64, texH: 32, cubes: CUBES_ZOMBIE, targetY: 0.85, cam: [1.1, 0.95, 1.6] },
    };

    function loadTex(dataUrl, onDone) {
      new THREE.TextureLoader().load(dataUrl, (t) => {
        t.magFilter = THREE.NearestFilter;
        t.minFilter = THREE.NearestFilter;
        t.colorSpace = THREE.SRGBColorSpace;
        t.flipY = false;
        onDone(t);
      });
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0e0e12);

    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.05, 200);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const mat = new THREE.MeshStandardMaterial({ side: THREE.DoubleSide, roughness: 0.85, metalness: 0.05 });
    const mesh = new THREE.Mesh(new THREE.BufferGeometry(), mat);
    scene.add(mesh);

    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const key = new THREE.DirectionalLight(0xffffff, 0.9);
    key.position.set(2, 4, 3);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xaabbff, 0.35);
    fill.position.set(-3, 2, -2);
    scene.add(fill);

    const grid = new THREE.GridHelper(4, 16, 0x333340, 0x22222a);
    scene.add(grid);

    let textures = {};

    function applyModel(key) {
      const cfg = CONFIG[key];
      if (!cfg || !textures[key]) return;
      mesh.geometry.dispose();
      mesh.geometry = buildGeometry(cfg.cubes, cfg.texW, cfg.texH);
      mat.map = textures[key];
      mat.needsUpdate = true;
      controls.target.set(0, cfg.targetY, 0);
      camera.position.set(...cfg.cam);
      controls.update();
      document.title = key === 'zombie' ? 'Zombie — 3D preview' : 'Arcane Invoker — 3D preview';
    }

    const pick = document.getElementById('modelPick');
    pick.addEventListener('change', () => {
      const v = pick.value;
      history.replaceState(null, '', v === 'invoker' ? location.pathname : '?model=' + v);
      applyModel(v);
    });

    function onResize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    }
    addEventListener('resize', onResize);

    function tick() {
      requestAnimationFrame(tick);
      controls.update();
      renderer.render(scene, camera);
    }

    const invokerUrl = 'data:image/png;base64,' + INVOKER_TEX;
    const zombieUrl = 'data:image/png;base64,' + ZOMBIE_TEX;
    let loaded = 0;
    function tryStart() {
      loaded++;
      if (loaded < 2) return;
      const q = new URLSearchParams(location.search).get('model');
      const initial = q === 'zombie' ? 'zombie' : 'invoker';
      pick.value = initial;
      applyModel(initial);
      tick();
    }
    loadTex(invokerUrl, (t) => { textures.invoker = t; tryStart(); });
    loadTex(zombieUrl, (t) => { textures.zombie = t; tryStart(); });
  </script>
