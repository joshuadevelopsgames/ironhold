# Lanthorn — Ironhold's optional medieval-cathedral shader pack
# https://github.com/IrisShaders/ShaderDoc/blob/master/shaders.properties.md

shader.pack.name=Lanthorn
shader.pack.author=Ironhold
shader.pack.description=Medieval-cathedral lighting for Minecraft: warm torchlight, cool moonlight, volumetric god-rays, painterly post-process, biome-tinted color grading.

# Options visible in the in-game shader-options screen.
profile.LOW = OFF:GODRAYS OFF:BLOOM
profile.MEDIUM = ON:GODRAYS OFF:BLOOM
profile.HIGH = ON:GODRAYS ON:BLOOM

screen = [WARMTH] [GODRAYS_GROUP] [BLOOM_GROUP] [PAINTERLY_GROUP] [GRADING_GROUP]
screen.WARMTH = TORCH_WARMTH MOON_COOLNESS NIGHT_BLUE
screen.GODRAYS_GROUP = GODRAYS GODRAY_SAMPLES GODRAY_INTENSITY GODRAY_DECAY
screen.BLOOM_GROUP = BLOOM BLOOM_THRESHOLD BLOOM_INTENSITY
screen.PAINTERLY_GROUP = PAINTERLY PAINTERLY_STRENGTH VIGNETTE VIGNETTE_STRENGTH
screen.GRADING_GROUP = BIOME_GRADING GRADING_STRENGTH

# Render target setup. colortex0 = scene HDR; colortex1 = bloom scratch.
# No shadow pass — god-rays use a screen-space radial blur from the sun's screen
# position against scene depth (the classic OptiFine "light shafts" approach).
clouds = fast
sun = true
moon = true
underwaterOverlay = true
